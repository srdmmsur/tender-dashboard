<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagarbhatti Professional Tender Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <div class="container mx-auto px-4 py-8">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-2">Nagarbhatti Tender Registry</h1>
            <p class="text-gray-500">Comprehensive Management & Analytics Dashboard</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-400 font-semibold uppercase">Total Tenders</p>
                <h3 id="statCount" class="text-3xl font-bold mt-2">--</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-400 font-semibold uppercase">Total Value</p>
                <h3 id="statTotalValue" class="text-3xl font-bold mt-2 text-blue-600">--</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm text-gray-400 font-semibold uppercase">Critical High-Value (>50L)</p>
                <h3 id="statHighValueCount" class="text-3xl font-bold mt-2 text-red-600">--</h3>
            </div>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 mb-10">
            <h2 class="text-2xl font-bold mb-6">Top 10 High-Value Tender Distribution</h2>
            <div class="h-96">
                <canvas id="valueBarChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-8 border-b border-gray-100">
                <h2 class="text-2xl font-bold">Master Registry (Sorted: High to Low)</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 text-xs uppercase text-gray-500">
                        <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvU_FekhqmOiiDiE6s7kuITQk_mQwEVTeisjyTIEbDiFkboyqlV4S-lEYHSUtJf2mYhMR8qwN2MXye/pub?output=csv";
        let globalData = [];
        let headers = [];

        // Formatting utilities
        const formatINR = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val);

        async function fetchData() {
            try {
                const res = await fetch(csvUrl + '&nocache=' + Math.random());
                const text = await res.text();
                const rows = text.split('\n').map(r => r.split(','));
                headers = rows[0].map(h => h.trim());
                globalData = rows.slice(1).filter(r => r.length > 1).map(r => {
                    let obj = {};
                    headers.forEach((h, i) => obj[h] = r[i]);
                    return obj;
                });
                renderEverything();
            } catch (err) {
                console.error("Error loading registry:", err);
            }
        }

        function renderEverything() {
            const valKey = headers.find(h => h.toLowerCase().includes('value')) || headers[5];
            const descKey = headers.find(h => h.toLowerCase().includes('desc')) || headers[2];

            // Sorting: High to Low
            const sorted = [...globalData].sort((a, b) => {
                const vA = parseFloat(a[valKey]?.replace(/[^\d.]/g, '')) || 0;
                const vB = parseFloat(b[valKey]?.replace(/[^\d.]/g, '')) || 0;
                return vB - vA;
            });

            // Update Statistics
            document.getElementById('statCount').innerText = sorted.length;
            const totalVal = sorted.reduce((sum, row) => sum + (parseFloat(row[valKey]?.replace(/[^\d.]/g, '')) || 0), 0);
            document.getElementById('statTotalValue').innerText = formatINR(totalVal);
            document.getElementById('statHighValueCount').innerText = sorted.filter(r => (parseFloat(r[valKey]?.replace(/[^\d.]/g, '')) || 0) >= 5000000).length;

            // Render Table
            document.getElementById('tableHeader').innerHTML = headers.map(h => `<th class="p-6">${h}</th>`).join('');
            document.getElementById('tableBody').innerHTML = sorted.map(row => {
                const val = parseFloat(row[valKey]?.replace(/[^\d.]/g, '')) || 0;
                return `
                    <tr class="${val >= 5000000 ? 'bg-yellow-50 hover:bg-yellow-100' : 'hover:bg-gray-50'} transition-colors">
                        ${headers.map(h => `<td class="p-6 font-medium">${h === valKey ? formatINR(val) : (row[h] || '')}</td>`).join('')}
                    </tr>
                `;
            }).join('');

            // Render Chart
            const ctx = document.getElementById('valueBarChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.slice(0, 10).map(i => (i[descKey] || 'N/A').substring(0, 20)),
                    datasets: [{
                        label: 'Value in INR',
                        data: sorted.slice(0, 10).map(i => parseFloat(i[valKey]?.replace(/[^\d.]/g, '')) || 0),
                        backgroundColor: '#ef4444',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: (v) => '₹' + v.toLocaleString('en-IN') } } } }
            });
        }

        fetchData();
    </script>
</body>
</html>
