<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Tender Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-100 min-h-screen font-sans transition-colors duration-200">

    <div class="container mx-auto px-4 py-6">
        <header class="flex justify-between items-center mb-8 bg-white dark:bg-darkCard p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
            <div>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Live Tender Dashboard</h1>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400">100% dynamic sync with your Google Sheet columns and rows</p>
            </div>
            <button id="themeToggle" class="p-2.5 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:ring-2 hover:ring-gray-300 dark:hover:ring-gray-600 transition-all">
                <i class="fa-solid fa-moon dark:hidden text-lg"></i>
                <i class="fa-solid fa-sun hidden dark:inline text-lg text-yellow-400"></i>
            </button>
        </header>

        <section class="bg-white dark:bg-darkCard p-4 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-96">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Global search across all data..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-transparent focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
        </section>

        <div id="loadingIndicator" class="text-center py-12">
            <i class="fa-solid fa-spinner animate-spin text-4xl text-blue-500 mb-3"></i>
            <p class="text-gray-500 dark:text-gray-400">Fetching latest cloud architecture updates...</p>
        </div>

        <div id="dashboardContent" class="hidden">
            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                <div class="bg-white dark:bg-darkCard p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center justify-between">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider text-gray-400">Total Project Value</p>
                        <h3 id="statTotalValue" class="text-xl font-bold mt-1 text-blue-600 dark:text-blue-400">₹0.00</h3>
                    </div>
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-lg">
                        <i class="fa-solid fa-indian-rupee-sign text-xl"></i>
                    </div>
                </div>
                <div class="bg-white dark:bg-darkCard p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center justify-between">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider text-gray-400">Total Logged Rows</p>
                        <h3 id="statTotalBids" class="text-xl font-bold mt-1 text-emerald-600 dark:text-emerald-400">0</h3>
                    </div>
                    <div class="p-3 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-lg">
                        <i class="fa-solid fa-database text-xl"></i>
                    </div>
                </div>
                <div class="bg-white dark:bg-darkCard p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex items-center justify-between">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-wider text-gray-400">Average Entry Valuation</p>
                        <h3 id="statAvgValue" class="text-xl font-bold mt-1 text-purple-600 dark:text-purple-400">₹0.00</h3>
                    </div>
                    <div class="p-3 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-lg">
                        <i class="fa-solid fa-chart-line text-xl"></i>
                    </div>
                </div>
            </section>

            <section class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 mb-8">
                <h2 class="text-lg font-semibold mb-4 text-gray-900 dark:text-white">Financial Value Allocation</h2>
                <div class="relative h-80 w-full">
                    <canvas id="valueChart"></canvas>
                </div>
            </section>

            <section class="bg-white dark:bg-darkCard rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div class="p-5 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="text-lg font-semibold text-gray-900 dark:text-white">Dynamic Matrix Output</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr id="tableHeaderRow" class="bg-gray-50/70 dark:bg-gray-800/50 text-xs font-semibold uppercase text-gray-500 dark:text-gray-400 tracking-wider border-b border-gray-100 dark:border-gray-700">
                                </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100 dark:divide-gray-700 text-sm">
                            </tbody>
                    </table>
                </div>
                <div id="noDataMessage" class="hidden text-center py-12 text-gray-400">
                    <i class="fa-solid fa-folder-open text-4xl mb-3 block"></i> No matching data patterns located.
                </div>
            </section>
        </div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvU_FekhqmOiiDiE6s7kuITQk_mQwEVTeisjyTIEbDiFkboyqlV4S-lEYHSUtJf2mYhMR8qwN2MXye/pub?output=csv";
        
        let headers = [];
        let globalData = [];
        let chartInstance = null;

        function formatCurrency(val) {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(val);
        }

        // CSV parsing array generator
        function parseCSV(text) {
            let p = '', c = '', r = [];
            let q = false;
            for (let i = 0; i < text.length; i++) {
                c = text[i];
                if (c === '"') { q = !q; }
                else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
                else if ((c === '\r' || c === '\n') && !q) {
                    r.push(p.trim()); p = '';
                    if (c === '\r' && text[i+1] === '\n') { i++; }
                    return { row: r, nextIndex: i + 1 };
                } else { p += c; }
            }
            r.push(p.trim());
            return { row: r, nextIndex: text.length };
        }

        async function fetchLiveData() {
            try {
                const response = await fetch(csvUrl + '&t=' + new Date().getTime()); // Bypasses browser caching
                const csvText = await response.text();
                
                globalData = [];
                let currentIndex = 0;

                // 1. Map Headers Dynamically
                const headerParsed = parseCSV(csvText);
                headers = headerParsed.row.filter(h => h !== '');
                currentIndex = headerParsed.nextIndex;

                // 2. Map Rows Dynamically based on header count
                while (currentIndex < csvText.length) {
                    const lineParsed = parseCSV(csvText.substring(currentIndex));
                    if (lineParsed.row.length === 0 || lineParsed.row.join('') === '') {
                        currentIndex += lineParsed.nextIndex;
                        continue;
                    }
                    
                    let item = {};
                    headers.forEach((header, index) => {
                        item[header] = lineParsed.row[index] || '';
                    });
                    globalData.push(item);
                    currentIndex += lineParsed.nextIndex;
                }

                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('dashboardContent').classList.remove('hidden');
                
                renderDashboard(globalData);
            } catch (err) {
                console.error(err);
            }
        }

        function renderDashboard(data) {
            // Find which column name stands for value and description dynamically
            const valKey = headers.find(h => h.toLowerCase().includes('value')) || headers[5];
            const descKey = headers.find(h => h.toLowerCase().includes('description') || h.toLowerCase().includes('name')) || headers[2];

            // Update Metrics
            const totalValue = data.reduce((acc, curr) => acc + (parseFloat(curr[valKey]?.replace(/[^\d.]/g, '')) || 0), 0);
            const avgValue = data.length ? (totalValue / data.length) : 0;
            
            document.getElementById('statTotalValue').innerText = formatCurrency(totalValue);
            document.getElementById('statTotalBids').innerText = data.length;
            document.getElementById('statAvgValue').innerText = formatCurrency(avgValue);

            // Render Auto Table Headers
            const headerRow = document.getElementById('tableHeaderRow');
            headerRow.innerHTML = headers.map(h => `<th class="py-3.5 px-5">${h}</th>`).join('');

            // Render Auto Table Body Rows
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                document.getElementById('noDataMessage').classList.remove('hidden');
                return;
            }
            document.getElementById('noDataMessage').classList.add('hidden');

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50/50 dark:hover:bg-gray-800/40 transition-colors";
                
                let rowHtml = '';
                headers.forEach(h => {
                    let cellVal = row[h] || '';
                    // Highlight numbers if they belong to value column
                    if(h === valKey) {
                        const num = parseFloat(cellVal.replace(/[^\d.]/g, '')) || 0;
                        rowHtml += `<td class="py-3 px-5 font-mono font-semibold text-blue-600 dark:text-blue-400">${formatCurrency(num)}</td>`;
                    } else {
                        rowHtml += `<td class="py-3 px-5">${cellVal}</td>`;
                    }
                });
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });

            // Update Chart
            const ctx = document.getElementById('valueChart').getContext('2d');
            const isDark = document.documentElement.classList.contains('dark');
            if (chartInstance) chartInstance.destroy();

            const chartItems = [...data].slice(0, 8); // Top 8 items
            
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartItems.map(item => item[descKey] || 'Item'),
                    datasets: [{
                        data: chartItems.map(item => parseFloat(item[valKey]?.replace(/[^\d.]/g, '')) || 0),
                        backgroundColor: isDark ? '#3b82f6' : '#2563eb',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: isDark ? '#94a3b8' : '#64748b' }, grid: { display: false } },
                        y: { ticks: { color: isDark ? '#94a3b8' : '#64748b' }, grid: { color: isDark ? '#334155' : '#e2e8f0' } }
                    }
                }
            });
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                const filtered = globalData.filter(row => 
                    Object.values(row).some(val => String(val).toLowerCase().includes(query))
                );
                renderDashboard(filtered);
            });

            document.getElementById('themeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                renderDashboard(globalData);
            });
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        }

        window.onload = () => {
            setupEventListeners();
            fetchLiveData();
            setInterval(fetchLiveData, 30000); // Polls Google sheet background changes every 30 seconds
        };
    </script>
</body>
</html>
