<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagarbhatti Tender Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Nagarbhatti Tender Registry</h1>

        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <h2 class="text-xl font-semibold mb-4">Top 10 Highest Value Cases</h2>
            <div class="h-80">
                <canvas id="valueBarChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow overflow-x-auto">
            <h2 class="text-xl font-semibold mb-4">Full List (Sorted: High to Low)</h2>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr id="tableHeader" class="bg-gray-200 border-b-2 border-gray-300"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvU_FekhqmOiiDiE6s7kuITQk_mQwEVTeisjyTIEbDiFkboyqlV4S-lEYHSUtJf2mYhMR8qwN2MXye/pub?output=csv";
        let globalData = [];
        let headers = [];
        let chart = null;

        // Indian Rupee Formatter
        const formatINR = (val) => new Intl.NumberFormat('en-IN', {
            style: 'currency',
            currency: 'INR',
            maximumFractionDigits: 0
        }).format(val);

        async function init() {
            const res = await fetch(csvUrl + '&nocache=' + Math.random());
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            
            headers = rows[0].map(h => h.trim());
            globalData = rows.slice(1).filter(r => r.length > 1).map(r => {
                let obj = {};
                headers.forEach((h, i) => obj[h] = r[i]);
                return obj;
            });

            renderDashboard();
        }

        function renderDashboard() {
            const valKey = headers.find(h => h.toLowerCase().includes('value')) || headers[5];
            const descKey = headers.find(h => h.toLowerCase().includes('desc')) || headers[2];

            // SORT DESCENDING: Highest value first
            const sorted = [...globalData].sort((a, b) => {
                const valA = parseFloat(a[valKey]?.replace(/[^\d.]/g, '')) || 0;
                const valB = parseFloat(b[valKey]?.replace(/[^\d.]/g, '')) || 0;
                return valB - valA; 
            });

            // Build Table
            const headRow = document.getElementById('tableHeader');
            headRow.innerHTML = headers.map(h => `<th class="p-3">${h}</th>`).join('');
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = sorted.map(row => {
                const val = parseFloat(row[valKey]?.replace(/[^\d.]/g, '')) || 0;
                const isHighValue = val >= 5000000; // 50 Lakh Highlight
                
                return `
                    <tr class="border-b hover:bg-gray-50 ${isHighValue ? 'bg-yellow-100 font-bold' : ''}">
                        ${headers.map(h => {
                            const cellValue = row[h] || '';
                            const displayVal = (h === valKey) ? formatINR(val) : cellValue;
                            return `<td class="p-3">${displayVal}</td>`;
                        }).join('')}
                    </tr>
                `;
            }).join('');

            // Build Chart
            const ctx = document.getElementById('valueBarChart').getContext('2d');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.slice(0, 10).map(i => (i[descKey] || 'Tender').substring(0, 15)),
                    datasets: [{
                        label: 'Value (INR)',
                        data: sorted.slice(0, 10).map(i => parseFloat(i[valKey]?.replace(/[^\d.]/g, '')) || 0),
                        backgroundColor: '#ef4444'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: {
                        y: { ticks: { callback: (val) => '₹' + val.toLocaleString('en-IN') } }
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>
